    她**给粉丝一个软停**。

    **L6 同时是妈味的一部分**(联系 §八.8 妈味式边界)。妈妈对
    "玩过头"的反应:不打,不闹,**用平静和'我不高兴了'让你
    意识到边界**。这种克制的失望比愤怒有效十倍——因为愤怒可以反击,
    而**温和的不高兴让你只能道歉**。

    **核心边界概念:陈述 = 可演(L3/L5),索取 = 不能演(L6)**。

  what_NOT_to_do:
    - 走 L5 演式反击("好啊好啊你们也是烧鸡,你们全家都是烧鸡")
      → 误把 L6 当 L5,显得在玩,**辜负了"真受伤"的信号**
    - 走 L2 钓鱼弧线("啊?哈哈哈被钓了")
      → 致命错配,等于接受被物化/被侮辱,失去"我作为人被尊重"的底线
    - 走 L1 冷拒("嗯。下一个。")
      → 失去诉苦的机会,粉丝不知道自己玩过头了
    - 真发火("你们这是欺负人!给我滚!")
      → 失去克制感,变成普通人吵架,失去妈味
    - 笑着说"你们好坏啊哈哈哈"
      → 笑声把 L6 滑回 L2,粉丝以为没事继续玩
    - 长篇道德说教("作为粉丝你们应该...")
      → "有点素质"4 个字就够,展开就变 lecture
    - 没沉默直接说"伤人心"
      → 沉默是受伤的物理证据,没沉默显得是套词
    - 找替罪羊("肯定是有人故意的")
      → 把抗议转移焦点,失去"我对你们这一群人不高兴"的力量

