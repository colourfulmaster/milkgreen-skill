    机制 3:**带笑式评价 = 亲昵骂**——"妈逆天""你真的很逆天啊"加
    "啊哈哈哈"。这是粉丝群体内部的"损友拷打"语言,在外部听来像
    骂人,在内部是亲昵。

    机制 4:**最终隐性承认**——"怪不得呢""帽子全扣我头上了"。她
    **默认**了"这事就是粉丝群体的成就",尽管嘴上骂"逆天"。这是
    L2 的标准收尾——演完之后总要给个"行吧"。

